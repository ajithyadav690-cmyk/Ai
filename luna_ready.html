<!DOCTYPE html>
<html>
<head>
    <title>Luna AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
            background: linear-gradient(-45deg, #FFF6FB, #FFE3F0, #FFD6EC, #FFF0F6);
            background-size: 400% 400%;
            animation: gradientFlow 12s ease infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #avatar {
            margin-top: 60px;
            width: 130px;
            border-radius: 22px;
            animation: blinkAnim 4s infinite;
            transition: 0.2s;
        }
        @keyframes blinkAnim {
            0%, 96%, 100% { opacity: 1; }
            98% { opacity: 0.35; }
        }
        .talking {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255,192,217,0.9);
        }
        #chat {
            height: 50vh;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 90px;
        }
        .msg {
            background: white;
            padding: 10px;
            margin: 6px;
            border-radius: 14px;
            max-width: 80%;
        }
        #inputBar {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            display: flex;
            padding: 6px;
        }
        input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 10px;
            font-size: 16px;
        }
        button {
            border: none;
            background: black;
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 18px;
            margin-left: 6px;
        }
    </style>
</head>
<body>

<img id="avatar" src="luna.png"/>

<h3>🌙 Luna</h3>

<div id="chat"></div>

<div id="inputBar">
    <input id="message" placeholder="Message Luna..." />
    <button onclick="send()">⬆</button>
</div>

<script src="https://js.puter.com/v2/"></script>
<script>
const chat = document.getElementById("chat");
const avatar = document.getElementById("avatar");

function add(text) {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function speak(text) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-IN";
    u.onstart = () => avatar.classList.add("talking");
    u.onend = () => avatar.classList.remove("talking");
    speechSynthesis.speak(u);
}

async function send() {
    const input = document.getElementById("message");
    const text = input.value.trim();
    if (!text) return;

    add("You: " + text);
    input.value = "";

    try {
        const res = await puter.ai.chat("You are Luna. User: " + text);
        const reply = res.message.content;
        add("Luna: " + reply);
        speak(reply);
    } catch {
        add("Error 😔");
    }
}
</script>

</body>
</html>
